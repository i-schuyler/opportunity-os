<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Opportunity OS</title>
    <meta name="description" content="Opportunity OS signed-in dashboard placeholder." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell" aria-label="Signed-in app shell">
      <header class="shell__header shell__header--row">
        <div>
          <p class="eyebrow">Dashboard</p>
          <h1>Your opportunities</h1>
        </div>
        <div class="stack-sm dashboard__actions">
          <p class="meta" id="session-email"></p>
          <button id="sign-out-button" class="button">Sign out</button>
        </div>
      </header>

      <main class="shell__main">
        <section class="panel">
          <h2>Create or edit opportunity</h2>
          <form id="opportunity-form" class="opportunity-form stack-sm">
            <input type="hidden" name="id" />
            <label class="field">
              <span>Title</span>
              <input name="title" required />
            </label>
            <label class="field">
              <span>Type</span>
              <input name="type" placeholder="housing, barter, job, general..." />
            </label>
            <label class="field">
              <span>Source link</span>
              <input name="source_link" type="url" placeholder="https://example.com/opportunity" />
            </label>
            <label class="field">
              <span>Contact</span>
              <input name="contact" placeholder="name or email" />
            </label>
            <label class="field">
              <span>Deadline</span>
              <input name="deadline" type="date" />
            </label>
            <label class="field">
              <span>Status</span>
              <input name="status" placeholder="new, applied, interviewing..." />
            </label>
            <label class="field">
              <span>Tags (comma-separated)</span>
              <input name="tags" placeholder="housing, urgent" />
            </label>
            <label class="field">
              <span>Notes</span>
              <textarea name="notes" rows="4" placeholder="What matters about this opportunity?"></textarea>
            </label>
            <div class="opportunity-form__actions">
              <button type="submit" class="button button--solid" id="save-opportunity-button">Save opportunity</button>
              <button type="button" class="button" id="cancel-edit-button" hidden>Cancel edit</button>
            </div>
          </form>
        </section>

        <section class="panel panel--muted">
          <h2>Next best actions</h2>
          <p class="meta" id="next-best-action-summary">Practical follow-up suggestions from your active opportunities.</p>
          <ul id="next-best-action-list" class="next-best-action-list"></ul>
        </section>

        <section class="panel">
          <div class="shell__header--row">
            <h2>Opportunities</h2>
            <label class="field-inline">
              <span>View</span>
              <select id="filter-view">
                <option value="active">Active</option>
                <option value="archived">Archived</option>
              </select>
            </label>
            <label class="field-inline">
              <span>Status</span>
              <select id="filter-status">
                <option value="all">All statuses</option>
              </select>
            </label>
            <label class="field-inline">
              <span>Sort</span>
              <select id="filter-sort">
                <option value="deadline_nearest">Nearest deadline</option>
                <option value="updated_recent">Recently updated</option>
                <option value="title_az">Title A-Z</option>
              </select>
            </label>
            <div class="dashboard-transfer-actions">
              <button id="export-json-button" type="button" class="button button--subtle">Export JSON</button>
              <button id="import-json-button" type="button" class="button button--subtle">Import JSON</button>
              <input id="import-json-input" type="file" accept="application/json,.json" hidden />
            </div>
          </div>
          <p id="filter-summary" class="meta"></p>
          <p id="transfer-feedback" class="meta" hidden></p>
          <div id="bulk-actions" class="bulk-actions" hidden>
            <p id="selected-summary" class="meta"></p>
            <div class="bulk-actions__controls">
              <button id="bulk-archive-button" type="button" class="button button--subtle">Archive selected</button>
              <label class="field-inline" for="bulk-status-select">
                <span>Set status</span>
                <select id="bulk-status-select">
                  <option value="">Choose status</option>
                </select>
              </label>
              <button id="bulk-status-apply-button" type="button" class="button button--subtle">Apply status</button>
            </div>
          </div>
          <div id="opportunity-list" class="stack-sm"></div>
        </section>
      </main>
    </div>
    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
