name: codex-issue-to-pr

on:
  issues:
    types:
      - opened
      - reopened
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to re-run against'
        required: false
        type: string

concurrency:
  group: codex-issue-${{ github.event.issue.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-issue-to-pr:
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event.issue.pull_request == null && (
          contains(join(github.event.issue.labels.*.name, ','), 'codex') ||
          (github.event_name == 'issue_comment' && (
            startsWith(github.event.comment.body, '/codex') ||
            startsWith(github.event.comment.body, '/retry')
          ))
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve issue context for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        id: resolve_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          result-encoding: string
          script: |
            const raw = core.getInput('issue_number');
            const issueNumber = Number(raw || '0');
            if (!issueNumber) core.setFailed('workflow_dispatch requires issue_number');
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            core.setOutput('issue_number', String(issue.number));
            core.setOutput('issue_title', issue.title || '');
            core.setOutput('issue_body', issue.body || '');
            core.setOutput('issue_url', issue.html_url || '');
            core.setOutput('issue_author', issue.user?.login || '');

      - name: Export issue context
        env:
          ISSUE_NUMBER_VALUE: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_issue.outputs.issue_number || github.event.issue.number }}
          ISSUE_TITLE_VALUE: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_issue.outputs.issue_title || github.event.issue.title }}
          ISSUE_BODY_VALUE: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_issue.outputs.issue_body || github.event.issue.body }}
          ISSUE_URL_VALUE: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_issue.outputs.issue_url || github.event.issue.html_url }}
          ISSUE_AUTHOR_VALUE: ${{ github.event_name == 'workflow_dispatch' && steps.resolve_issue.outputs.issue_author || github.event.issue.user.login }}
          REPO_NAME_VALUE: ${{ github.repository }}
          DEFAULT_BRANCH_VALUE: ${{ github.event.repository.default_branch || 'main' }}
          CODEX_ALLOWED_USERS_VALUE: ${{ vars.CODEX_ALLOWED_USERS || 'i-schuyler' }}
          CODEX_MODEL_VALUE: ${{ vars.CODEX_MODEL || 'gpt-5.3-codex' }}
          CODEX_EFFORT_VALUE: ${{ vars.CODEX_EFFORT || 'medium' }}
          CODEX_BRANCH_PREFIX_VALUE: ${{ vars.CODEX_BRANCH_PREFIX || 'codex' }}
        run: |
          {
            printf 'ISSUE_NUMBER=%s\n' "$ISSUE_NUMBER_VALUE"
            printf 'ISSUE_TITLE=%s\n' "$ISSUE_TITLE_VALUE"
            echo 'ISSUE_BODY<<EOF'
            printf '%s\n' "$ISSUE_BODY_VALUE"
            echo 'EOF'
            printf 'ISSUE_URL=%s\n' "$ISSUE_URL_VALUE"
            printf 'ISSUE_AUTHOR=%s\n' "$ISSUE_AUTHOR_VALUE"
            printf 'REPO_NAME=%s\n' "$REPO_NAME_VALUE"
            printf 'DEFAULT_BRANCH=%s\n' "$DEFAULT_BRANCH_VALUE"
            printf 'CODEX_ALLOWED_USERS=%s\n' "$CODEX_ALLOWED_USERS_VALUE"
            printf 'CODEX_MODEL=%s\n' "$CODEX_MODEL_VALUE"
            printf 'CODEX_EFFORT=%s\n' "$CODEX_EFFORT_VALUE"
            printf 'CODEX_BRANCH_PREFIX=%s\n' "$CODEX_BRANCH_PREFIX_VALUE"
          } >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}
          fetch-depth: 0

      - name: Create branch name
        id: branch_name
        run: |
          slug=$(printf '%s' "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\{2,\}/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-36)
          [ -n "$slug" ] || slug="issue"
          echo "branch=${CODEX_BRANCH_PREFIX}/issue-${ISSUE_NUMBER}-${slug}" >> "$GITHUB_OUTPUT"

      - name: Detect duplicate Codex work
        id: duplicate_check
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch_name.outputs.branch }}
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.BRANCH_NAME;
            const head = `${owner}:${branch}`;

            const { data: openPrs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              per_page: 1,
            });
            if (openPrs.length > 0) {
              core.setOutput('skip', 'true');
              core.setOutput('reason', `Skipping duplicate run: open PR already exists for ${branch} (${openPrs[0].html_url}).`);
              return;
            }

            core.setOutput('skip', 'false');

      - name: Comment skipped duplicate run
        if: steps.duplicate_check.outputs.skip == 'true' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          DUPLICATE_REASON: ${{ steps.duplicate_check.outputs.reason }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: process.env.DUPLICATE_REASON || 'Skipping duplicate Codex run for this issue.',
            });

      - name: Comment started on issue
        if: github.event_name != 'workflow_dispatch' && steps.duplicate_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Codex started…',
            });

      - name: Prepare npm dependencies when lockfile exists
        if: steps.duplicate_check.outputs.skip != 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json present yet; skipping npm ci"
          fi

      - name: Build runtime prompt file
        if: steps.duplicate_check.outputs.skip != 'true'
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          ISSUE_URL: ${{ env.ISSUE_URL }}
          ISSUE_AUTHOR: ${{ env.ISSUE_AUTHOR }}
          ISSUE_TITLE: ${{ env.ISSUE_TITLE }}
          ISSUE_BODY: ${{ env.ISSUE_BODY }}
        run: |
          PROMPT_FILE="$RUNNER_TEMP/issue_to_pr_prompt.md"
          CODEX_HOME_DIR="$RUNNER_TEMP/codex-home"
          {
            printf 'CODEX_PROMPT_FILE=%s\n' "$PROMPT_FILE"
            printf 'CODEX_HOME_DIR=%s\n' "$CODEX_HOME_DIR"
          } >> "$GITHUB_ENV"
          {
            cat <<PROMPT
          You are Codex acting as a GitHub issue-to-PR agent for Opportunity OS.

          Goal:
          - Read the repository, the issue, and the project docs.
          - Implement the smallest correct slice that resolves the issue.
          - Prefer narrow, reversible changes.
          - Update docs/tests when needed.
          - Run lightweight verification where available.
          - Do not change billing, authentication, schema migration, privacy/legal copy, GitHub workflows, or destructive data behavior unless the issue explicitly requires it.

          Required repo docs to consult first:
          - ACCEPTANCE.md
          - docs/FOUNDING_SPEC.md
          - docs/DECISIONS_SNAPSHOT.md
          - docs/ASSUMPTIONS_REGISTRY.md
          - docs/AUTOMATION_POLICY.md
          - docs/SMOKE_TEST_SPEC.md
          - docs/PROJECT_INSTRUCTIONS_FOR_CHATGPT.md
          - docs/ISSUE_TO_PR_WORKFLOW.md

          Issue metadata:
          - Repository: ${REPO_NAME}
          - Issue: #${ISSUE_NUMBER}
          - URL: ${ISSUE_URL}
          - Author: ${ISSUE_AUTHOR}
          - Title: ${ISSUE_TITLE}

          Issue body follows exactly:
          ---ISSUE_BODY_START---
          ${ISSUE_BODY}
          ---ISSUE_BODY_END---

          Delivery rules:
          - Keep scope tight.
          - If the issue is ambiguous but the safest default is reversible, proceed with a conservative default and note it in docs/ASSUMPTIONS_REGISTRY.md.
          - If no code change is appropriate, write the minimum docs-only clarification.
          - Do not add a license.
          - Do not remove existing safeguards.
          - Keep the repository public-readable.

          Before finishing:
          - Run ./ci.sh if it is safe to do so.
          - Summarize exactly what changed and any remaining risks in the final message.
          PROMPT
          } > "$PROMPT_FILE"

      - name: Guard runtime Codex artifacts
        if: steps.duplicate_check.outputs.skip != 'true'
        run: |
          [ -f "$CODEX_PROMPT_FILE" ] || { echo "Missing runtime prompt file: $CODEX_PROMPT_FILE"; exit 1; }
          [ -s "$CODEX_PROMPT_FILE" ] || { echo "Runtime prompt file is empty: $CODEX_PROMPT_FILE"; exit 1; }
          mkdir -p "$CODEX_HOME_DIR"
          echo "Runtime prompt path: $CODEX_PROMPT_FILE"
          echo "Codex home path: $CODEX_HOME_DIR"
          echo "Issue metadata debug: number=$ISSUE_NUMBER title_len=${#ISSUE_TITLE} body_len=${#ISSUE_BODY}"
          unresolved=0
          placeholders=("\${ISSUE_TITLE}" "\${ISSUE_BODY}" "\${ISSUE_NUMBER}" "\${ISSUE_URL}")
          for placeholder in "${placeholders[@]}"; do
            if grep -Fq "$placeholder" "$CODEX_PROMPT_FILE"; then
              echo "Unresolved placeholder found in runtime prompt: $placeholder"
              unresolved=1
            fi
          done
          [ "$unresolved" -eq 0 ] || exit 1

      - name: Run Codex
        if: steps.duplicate_check.outputs.skip != 'true'
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ env.CODEX_PROMPT_FILE }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          model: ${{ env.CODEX_MODEL }}
          effort: ${{ env.CODEX_EFFORT }}
          allow-users: ${{ env.CODEX_ALLOWED_USERS }}
          codex-home: ${{ env.CODEX_HOME_DIR }}

      - name: Detect changes
        if: steps.duplicate_check.outputs.skip != 'true'
        id: detect_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment when no changes were produced
        if: steps.duplicate_check.outputs.skip != 'true' && steps.detect_changes.outputs.changed != 'true' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              'Codex completed but did not produce a file change.',
              '',
              process.env.CODEX_FINAL_MESSAGE || 'No final message was returned.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body,
            });

      - name: Commit changes
        if: steps.detect_changes.outputs.changed == 'true'
        env:
          BRANCH_NAME: ${{ steps.branch_name.outputs.branch }}
        run: |
          git switch -c "$BRANCH_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: resolve #${ISSUE_NUMBER} via Codex"

      - name: Push branch
        if: steps.detect_changes.outputs.changed == 'true'
        env:
          BRANCH_NAME: ${{ steps.branch_name.outputs.branch }}
        run: |
          git push --set-upstream origin "$BRANCH_NAME"

      - name: Create or reuse pull request
        if: steps.detect_changes.outputs.changed == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.branch_name.outputs.branch }}
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          existing_pr=$(gh pr list --head "$BRANCH_NAME" --json url --jq '.[0].url')
          if [ -n "$existing_pr" ]; then
            echo "pr_url=$existing_pr" >> "$GITHUB_OUTPUT"
          else
            body_file=$(mktemp)
            cat > "$body_file" <<PRBODY
          ## Summary
          Automated Codex draft for issue #${ISSUE_NUMBER}.

          ## Issue
          Closes #${ISSUE_NUMBER}

          ## Scope
          Narrow, reversible implementation slice.

          ## Risk
          RISK: low
          BREAKING: no
          NEEDS_HIL: no

          ## Codex final message
          ${CODEX_FINAL_MESSAGE}
          PRBODY
            pr_url=$(gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH_NAME" \
              --title "feat: resolve #${ISSUE_NUMBER} ${ISSUE_TITLE}" \
              --body-file "$body_file" \
              --draft)
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment back on issue
        if: steps.detect_changes.outputs.changed == 'true' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          BRANCH_NAME: ${{ steps.branch_name.outputs.branch }}
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              `PR created: ${process.env.PR_URL}`,
              '',
              `Branch: \`${process.env.BRANCH_NAME}\``,
              '',
              'Codex summary:',
              process.env.CODEX_FINAL_MESSAGE || 'No final message was returned.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body,
            });

      - name: Comment recovery details on failure
        if: failure() && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: [
                `Codex workflow failed for issue #${process.env.ISSUE_NUMBER}.`,
                '',
                `Workflow run: ${runUrl}`,
                '',
                'Recovery:',
                '- Check Actions for the failing step.',
                '- Check whether a remote `codex/issue-*` branch was pushed.',
                '- Use manual PR recovery before retrying if a branch exists.',
              ].join('\n'),
            });
