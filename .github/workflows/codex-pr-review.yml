name: codex-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  codex-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Codex review
        id: codex_review
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          model: ${{ vars.CODEX_MODEL || 'gpt-5.3-codex' }}
          effort: low
          prompt: |
            Review this pull request conservatively.
            Focus on:
            - scope drift
            - missing tests or verification
            - policy-gate mismatch
            - risky auth/billing/schema/workflow changes
            - obvious bugs or regressions

            Keep comments concise and actionable.
            If there are no material concerns, say so clearly.

      - name: Post PR review summary
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex_review.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              'Codex review summary:',
              '',
              process.env.CODEX_FINAL_MESSAGE || 'No final message was returned.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
