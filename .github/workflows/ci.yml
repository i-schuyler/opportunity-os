name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  policy-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint GitHub workflows
        uses: rhysd/actionlint@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run ci entrypoint
        run: ./ci.sh
