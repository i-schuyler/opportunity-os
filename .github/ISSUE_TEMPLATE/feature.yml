name: Feature request (automation-ready)
description: Request a small, testable slice for Opportunity OS.
title: "feat: "
labels:
  - feature
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: One concise sentence describing the requested change.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant product or technical context.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Numbered pass/fail checks.
    validations:
      required: true
  - type: textarea
    id: test_plan
    attributes:
      label: Test plan
      description: CI and manual verification steps.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true
